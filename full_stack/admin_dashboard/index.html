<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="header">
        <div class="top-header">
            <div class="top-header1">
                <img class="header-img" src="/assets/header/magnify.svg" alt="search icon" height="100px" width="100px">
                <input type="search" placeholder="find anything">
            </div>
            <div class="profile">
                <img class="header-img" src="assets/header/bell.svg" alt="bell icon" height="100px" width="100px">
                <img class="header-img" src="assets/header/user.png" alt="user profile picture">
                <p>Morgan Oakley</p>
            </div>
        </div>
        <div class="bottom-header">
            <div class="hi">
                <img class="header-img bottom-header-img" src="assets/header/user.png" alt="user profile picture">
                <p>Hi there,<span style="display: flex;">Morgan Oakley (@morgan)</span></p>
            </div>
            <div class="menu">
                <button>Home</button>
                <button>Upload</button>
                <button> Share</button>
            </div>
        </div>
    </header>
</body>
</html>
