<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="header">
        <div class="top-header">
            <div class="top-header1">
                <img class="header-img" src="/assets/header/magnify.svg" alt="search icon" height="100px" width="100px">
                <input type="search" placeholder="find anything">
            </div>
            <div class="profile">
                <img class="header-img" src="assets/header/bell.svg" alt="bell icon" height="100px" width="100px">
                <img class="header-img" src="assets/header/user.png" alt="user profile picture">
                <p>Morgan Oakley</p>
            </div>
        </div>
        <div class="bottom-header">
            <div class="hi">
                <img class="header-img bottom-header-img" src="assets/header/user.png" alt="user profile picture">
                <p>Hi there,<span style="display: flex;">Morgan Oakley (@morgan)</span></p>
            </div>
            <div class="menu">
                <button>Home</button>
                <button>Upload</button>
                <button> Share</button>
            </div>
        </div>
    </header>

    <nav class="sidebar">
        <div class="side-logo">
            <img src="assets/nav/dashboard-logo.svg" alt="Dashboard icon" height="100px" width="100px">
            <h3>Dashboard</h3>
        </div>
        <div class="upper-sidebar">
            <ul>
                <li><img src="assets/nav/home.svg" alt="Home icon">
                    <p>Home</p>
                </li>
                <li><img src="assets/nav/profile.svg" alt="profile icon">
                    <p>Profile</p>
                </li>
                <li><img src="assets/nav/message.svg" alt="messages icon">
                    <p>Messages</p>
                </li>
                <li><img src="assets/nav/history.svg" alt="history icon">
                    <p>History</p>
                </li>
                <li><img src="assets/nav/tasks.svg" alt="task icon">
                    <p>Task</p>
                </li>
                <li><img src="assets/nav/comunity.svg" alt="comunity icon">
                    <p>Communities</p>
                </li>
            </ul>
        </div>

        <div class="lower-sidebar">
            <ul>
                <li><img src="assets/nav/settings.svg" alt="settings icon">
                    <p>Settings</p>
                </li>
                <li><img src="assets/nav/support.svg" alt="support icon">
                    <p>Support</p>
                </li>
                <li><img src="assets/nav/privacy.svg" alt="privacy icon">
                    <p>Privacy</p>
                </li>
            </ul>
        </div>
    </nav>

</body>
</html>
